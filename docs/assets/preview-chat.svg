<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <rect width="800" height="520" rx="16" fill="#F5F5F7"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="220" height="520" rx="16" fill="#FFFFFF"/>
  <text x="24" y="44" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="16" font-weight="700" fill="#1D1D1F">聊天记录</text>
  <rect x="20" y="66" width="180" height="48" rx="10" fill="#FFF5F2" stroke="#D97757" stroke-opacity="0.2"/>
  <text x="36" y="96" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#D97757">华东 Q3 业绩分析</text>
  <rect x="36" y="132" width="140" height="10" rx="3" fill="#E5E5EA"/>
  <rect x="36" y="150" width="110" height="10" rx="3" fill="#E5E5EA"/>
  <rect x="36" y="174" width="150" height="10" rx="3" fill="#E5E5EA"/>

  <!-- chat area -->
  <rect x="236" y="16" width="548" height="420" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>

  <!-- user msg -->
  <rect x="496" y="44" width="260" height="56" rx="14" fill="#D97757"/>
  <text x="516" y="72" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="14" fill="#FFFFFF">帮我看看华东区 Q3 销售额</text>
  <text x="516" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="14" fill="#FFFFFF">Top5 的产品是哪些？</text>

  <!-- assistant avatar -->
  <circle cx="276" cy="132" r="16" fill="#FFF5F2"/>
  <text x="276" y="137" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="12" font-weight="700" fill="#D97757">析</text>

  <!-- assistant msg -->
  <rect x="304" y="112" width="320" height="90" rx="14" fill="#F5F5F7"/>
  <text x="324" y="140" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="14" fill="#1D1D1F">华东区 Q3 销售额为 ¥1,820 万，</text>
  <text x="324" y="162" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="14" fill="#1D1D1F">同比增长 18%。Top5 产品如下：</text>
  <rect x="324" y="178" width="280" height="10" rx="3" fill="#E5E5EA"/>

  <!-- mini chart in chat -->
  <rect x="304" y="220" width="360" height="140" rx="12" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
  <text x="324" y="250" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="700" fill="#1D1D1F">华东 Q3 产品 Top5</text>
  <rect x="340" y="300" width="32" height="40" rx="4" fill="#D97757"/>
  <rect x="384" y="270" width="32" height="70" rx="4" fill="#D97757" fill-opacity="0.85"/>
  <rect x="428" y="290" width="32" height="50" rx="4" fill="#D97757" fill-opacity="0.7"/>
  <rect x="472" y="310" width="32" height="30" rx="4" fill="#D97757" fill-opacity="0.55"/>
  <rect x="516" y="325" width="32" height="15" rx="4" fill="#D97757" fill-opacity="0.4"/>

  <!-- input -->
  <rect x="236" y="452" width="548" height="56" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
  <rect x="256" y="470" width="180" height="20" rx="6" fill="#F5F5F7"/>
  <rect x="704" y="462" width="64" height="36" rx="8" fill="#D97757"/>
  <text x="724" y="485" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">发送</text>
</svg>
