  <text x="558" y="244" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="15" font-weight="700" fill="#1D1D1F">销售员 TOP5</text>

  <g transform="translate(558, 268)">
    <g transform="translate(0, 0)">
      <circle cx="10" cy="10" r="10" fill="#FFF5F2"/>
      <text x="10" y="14" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="10" font-weight="700" fill="#D97757">1</text>
      <text x="30" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">李娜</text>
      <text x="160" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="700" fill="#D97757">¥1,280万</text>
    </g>
    <g transform="translate(0, 42)">
      <circle cx="10" cy="10" r="10" fill="#F5F5F7"/>
      <text x="10" y="14" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="10" font-weight="700" fill="#6E6E73">2</text>
      <text x="30" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">张伟</text>
      <text x="160" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">¥980万</text>
    </g>
    <g transform="translate(0, 84)">
      <circle cx="10" cy="10" r="10" fill="#F5F5F7"/>
      <text x="10" y="14" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="10" font-weight="700" fill="#6E6E73">3</text>
      <text x="30" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">王强</text>
      <text x="160" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">¥820万</text>
    </g>
    <g transform="translate(0, 126)">
      <circle cx="10" cy="10" r="10" fill="#F5F5F7"/>
      <text x="10" y="14" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="10" font-weight="700" fill="#6E6E73">4</text>
      <text x="30" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">黄静</text>
      <text x="160" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">¥760万</text>
    </g>
    <g transform="translate(0, 168)">
      <circle cx="10" cy="10" r="10" fill="#F5F5F7"/>
      <text x="10" y="14" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="10" font-weight="700" fill="#6E6E73">5</text>
      <text x="30" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">杨丽</text>
      <text x="160" y="14" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">¥650万</text>
    </g>
