<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <rect width="800" height="520" rx="16" fill="#F5F5F7"/>

  <!-- header -->
  <rect x="24" y="20" width="752" height="48" rx="12" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
  <rect x="44" y="36" width="120" height="16" rx="4" fill="#1D1D1F"/>
  <rect x="660" y="34" width="96" height="20" rx="6" fill="#D97757" fill-opacity="0.1"/>
  <text x="676" y="49" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="12" font-weight="600" fill="#D97757">2024 年度</text>

  <!-- kpi cards -->
  <g transform="translate(24, 84)">
    <rect width="236" height="100" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
    <text x="20" y="34" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="500" fill="#6E6E73">总销售额</text>
    <text x="20" y="68" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="800" fill="#1D1D1F">¥4,230万</text>
    <rect x="20" y="80" width="56" height="6" rx="3" fill="#34C759" fill-opacity="0.2"/>

    <rect x="258" width="236" height="100" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
    <text x="278" y="34" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="500" fill="#6E6E73">订单量</text>
    <text x="278" y="68" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="800" fill="#1D1D1F">1,248 笔</text>
    <rect x="278" y="80" width="56" height="6" rx="3" fill="#34C759" fill-opacity="0.2"/>

    <rect x="516" width="236" height="100" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
    <text x="536" y="34" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="500" fill="#6E6E73">平均客单价</text>
    <text x="536" y="68" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="800" fill="#1D1D1F">¥33,900</text>
    <rect x="536" y="80" width="56" height="6" rx="3" fill="#FF9500" fill-opacity="0.2"/>
  </g>

  <!-- bar chart card -->
  <rect x="24" y="204" width="490" height="292" rx="14" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>
  <text x="48" y="244" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="15" font-weight="700" fill="#1D1D1F">区域销售额对比</text>
  <!-- bars -->
  <rect x="64" y="400" width="44" height="60" rx="4" fill="#D97757" fill-opacity="0.85"/>
  <rect x="124" y="360" width="44" height="100" rx="4" fill="#D97757" fill-opacity="0.85"/>
  <rect x="184" y="300" width="44" height="160" rx="4" fill="#D97757"/>
  <rect x="244" y="340" width="44" height="120" rx="4" fill="#D97757" fill-opacity="0.85"/>
  <rect x="304" y="380" width="44" height="80" rx="4" fill="#D97757" fill-opacity="0.85"/>
  <rect x="364" y="420" width="44" height="40" rx="4" fill="#D97757" fill-opacity="0.85"/>
  <!-- x labels -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="11" fill="#6E6E73">
    <text x="72" y="478">华东</text>
    <text x="132" y="478">华南</text>
    <text x="192" y="478">华北</text>
    <text x="252" y="478">华中</text>
    <text x="312" y="478">西南</text>
    <text x="372" y="478">西北</text>
  </g>
  <!-- y axis -->
  <line x1="56" y1="280" x2="56" y2="460" stroke="#E5E5EA" stroke-width="1"/>
  <line x1="56" y1="460" x2="470" y2="460" stroke="#E5E5EA" stroke-width="1"/>

  <!-- ranking card -->
